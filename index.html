<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>𝑵𝒈𝒖𝒚𝒆̂̃𝒏 𝑻𝒉𝒊̣ 𝑳𝒂𝒏 𝑨𝒏𝒉</title>
    
    <link href="https://fonts.googleapis.com/css?family=Roboto:400,500,700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/gh/leanhducprovn/cdn/font-awesome/pro-5.15.3/css/all.css" rel="stylesheet">
    <script crossorigin="anonymous" src="https://kit.fontawesome.com/e081c0a6dd.js"></script>

    <style>
        /* --- Giao diện chung --- */
        html, body {
            margin: 0; padding: 0;
            cursor: url("https://i.imgur.com/5v5M8gh.png"), auto;
            overflow-x: hidden;
            background-image: url('https://i.imgur.com/gDC82fW.gif');
            background-repeat: no-repeat;
            background-size: cover;
            background-attachment: fixed;
            font-family: 'Roboto', sans-serif;
        }

        #root {
            display: flex; align-items: center; justify-content: center;
            min-height: 100vh; padding: 20px 0;
        }

        #main {
            width: 411px; max-width: 90%;
            background-color: #fff;
            border-radius: 30px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
        }

        /* --- Header & Ảnh --- */
        #cover-image {
            width: 100%; height: 170px;
            background-image: url('https://i.imgur.com/vHq4R7L.jpg'); /* Ảnh bìa */
            background-position: center; background-size: cover;
        }

        #profile-header {
            display: flex; padding: 0 20px; margin-top: -35px; gap: 15px;
        }

        #avatar-image {
            width: 110px; height: 110px;
            border-radius: 25px;
            border: 4px solid #fff;
            background-position: center; background-size: cover;
            /* ĐÃ THAY LINK ẢNH TRỰC TIẾP CỦA BẠN TẠI ĐÂY */
            background-image: url('https://i.ibb.co/L8v6v6n/avatar.jpg');
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #name-box { padding-top: 40px; flex: 1; }
        .names { font-weight: 700; font-size: 19px; margin: 0; color: #333; }
        .sub-text { font-size: 13px; color: #777; display: block; margin-top: 2px; }

        .skill-group { margin-top: 8px; }
        .skill-item {
            display: inline-block; font-size: 10px; font-weight: 700;
            padding: 3px 8px; border-radius: 6px; margin-right: 4px;
            background: rgba(0,0,0,0.05); text-transform: uppercase;
        }

        /* --- Danh sách liên kết --- */
        #content-body { padding: 20px; }
        .section-title { font-weight: 700; font-size: 16px; margin-bottom: 15px; color: #444; }

        .link-item {
            display: flex; align-items: center; padding: 12px;
            background: #f9f9f9; border-radius: 18px; margin-bottom: 12px;
            transition: 0.3s; cursor: pointer; text-decoration: none; color: inherit;
        }
        .link-item:hover { background: #f0f7ff; transform: translateY(-2px); }

        .icon-thumb {
            width: 45px; height: 45px; border-radius: 12px;
            background-size: cover; margin-right: 15px;
        }

        .link-info { flex: 1; }
        .link-info p { margin: 0; font-weight: 600; font-size: 15px; }
        .link-info span { font-size: 12px; color: #888; }

        .btn-open { font-weight: 800; font-size: 12px; color: #ef9d64; }

        /* --- Music Popup --- */
        #music-confirm {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; align-items: center; 
            justify-content: center; z-index: 10000; backdrop-filter: blur(4px);
        }
        .confirm-box { background: white; padding: 25px; border-radius: 25px; text-align: center; width: 280px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        .confirm-btn { flex: 1; padding: 12px; border: none; border-radius: 12px; cursor: pointer; font-weight: 700; }
        .btn-yes { background: #ef9d64; color: white; }
        .btn-no { background: #eee; color: #666; }

        /* Tuyết rơi */
        .snowflake { position: fixed; top: -10%; z-index: 9999; color: #fff; user-select: none; pointer-events: none; }
    </style>
</head>
<body>

    <div id="music-confirm">
        <div class="confirm-box">
            <p style="margin:0; font-weight:700;">🎵 Nghe nhạc Chill khi xem Profile Lan Anh nhé?</p>
            <div class="btn-group">
                <button class="confirm-btn btn-yes" onclick="startMusic(true)">Nghe luôn</button>
                <button class="confirm-btn btn-no" onclick="startMusic(false)">Thôi ạ</button>
            </div>
        </div>
    </div>

    <div id="root">
        <div id="main">
            <div id="cover-image"></div>
            
            <div id="profile-header">
                <div id="avatar-image"></div>
                <div id="name-box">
                    <p class="names">𝑵𝒈𝒖𝒚𝒆̂̃𝒏 𝑻𝒉𝒊̣ 𝑳𝒂𝒏 𝑨𝒏𝒉 <i class="fas fa-check-circle" style="color:#2d88ff"></i></p>
                    <span class="sub-text">Chuyên Bán Hàng Auth</span>
                    <div class="skill-group">
                        <span class="skill-item" style="color:#ff4d6d;">HOT</span>
                        <span class="skill-item" style="color:#2d88ff;">AUTH</span>
                        <span class="skill-item" style="color:#40916c;">SKINCARE</span>
                    </div>
                </div>
            </div>

            <div id="content-body">
                <p class="section-title">Thông Tin Liên Hệ</p>
                
                <div class="link-item" onclick="window.open('https://www.facebook.com/lananh.nguyenthi.92102', '_blank')">
                    <div class="icon-thumb" style="background-image: url('https://i.imgur.com/q8qqsAy.png');"></div>
                    <div class="link-info">
                        <p>Facebook</p>
                        <span>ɴɢᴜʏᴇ̂̃ɴ ᴛʜɪ̣ ʟᴀɴ ᴀɴʜ</span>
                    </div>
                    <div class="btn-open">MỞ</div>
                </div>

                <div class="link-item" onclick="window.open('https://www.instagram.com/nguyenananhtu', '_blank')">
                    <div class="icon-thumb" style="background-image: url('https://i.imgur.com/1G4kS7D.png');"></div>
                    <div class="link-info">
                        <p>Instagram</p>
                        <span>lananh.auth</span>
                    </div>
                    <div class="btn-open">MỞ</div>
                </div>

                <div class="link-item" onclick="window.open('https://zalo.me/0363665265', '_blank')">
                    <div class="icon-thumb" style="background-image: url('https://i.imgur.com/8eN7qqF.png');"></div>
                    <div class="link-info">
                        <p>Zalo</p>
                        <span>Kết bạn ngay</span>
                    </div>
                    <div class="btn-open">MỞ</div>
                </div>

                <div class="link-item" onclick="copyEmail('Lananh1610vfu@mail.com')">
                    <div class="icon-thumb" style="background-image: url('https://i.imgur.com/k1Qbqxg.png');"></div>
                    <div class="link-info">
                        <p>Gmail</p>
                        <span>Lananh1610vfu@mail.com</span>
                    </div>
                    <div class="btn-open" style="color:#6a8de4;">COPY</div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" loop>
        <source src="" type="audio/mpeg">
    </audio>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        // Hàm Copy Email
        function copyEmail(email) {
            const el = document.createElement('textarea');
            el.value = email;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert("Đã copy địa chỉ Email!");
        }

        // Quản lý nhạc
        const songs = [
            'https://files.catbox.moe/eqqdvx.mp3',
            'https://files.catbox.moe/8g3pyw.mp3',
            'https://files.catbox.moe/dwy88x.mp3'
        ];
        const audioPlayer = document.getElementById('audioPlayer');

        function startMusic(play) {
            document.getElementById('music-confirm').style.display = 'none';
            if (play) {
                const randomSong = songs[Math.floor(Math.random() * songs.length)];
                audioPlayer.src = randomSong;
                audioPlayer.play();
            }
        }

        // Hiệu ứng tuyết rơi
        function createSnowflake() {
            const snowflake = document.createElement('div');
            snowflake.innerHTML = "❄";
            snowflake.classList.add('snowflake');
            snowflake.style.left = Math.random() * 100 + 'vw';
            snowflake.style.animationDuration = Math.random() * 3 + 2 + 's';
            snowflake.style.fontSize = Math.random() * 10 + 10 + 'px';
            snowflake.style.opacity = Math.random();
            document.body.appendChild(snowflake);
            
            let pos = -20;
            const timer = setInterval(() => {
                pos += 1.5;
                snowflake.style.top = pos + 'px';
                if (pos > window.innerHeight) {
                    clearInterval(timer);
                    snowflake.remove();
                }
            }, 20);
        }
        setInterval(createSnowflake, 400);
    </script>

</body>
</html>
