        .snowflake { position: fixed; top: -10%; z-index: 1000; color: #ebebeb; user-select: none; }
        #music-confirm { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: flex; align-items: center; justify-content: center; z-index: 99999; backdrop-filter: blur(5px); }

    <audio id="audioPlayer" loop>
        <source src="" type="audio/mpeg">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        function geturl(giatri) {
            var $temp = $("<input>");
            $("body").append($temp);
            $temp.val(giatri).select();
            document.execCommand("copy");
            $temp.remove();
            alert("Đã copy Email!");
        }

        var songs = ['https://files.catbox.moe/eqqdvx.mp3', 'https://files.catbox.moe/8g3pyw.mp3', 'https://files.catbox.moe/dwy88x.mp3'];
        function changeSong() {
            var randomIndex = Math.floor(Math.random() * songs.length);
            var audio = document.getElementById('audioPlayer');
            audio.src = songs[randomIndex];
            audio.play();
        }

        function startMusic(play) {
            document.getElementById('music-confirm').style.display = 'none';
            if (play) changeSong();
        }

        // Tuyết rơi
        var numberOfSnowflakes = 30;
        var snowflakes = [];
        function Snowflake(element) {
            this.element = element;
            this.x = Math.random() * window.innerWidth;
            this.y = Math.random() * window.innerHeight;
            this.speed = 1 + Math.random() * 3;
            this.update = function() {
                this.y += this.speed;
                if (this.y > window.innerHeight) this.y = -50;
                this.element.style.transform = `translate3d(${this.x}px, ${this.y}px, 0)`;
            }
        }
        function setupSnow() {
            var container = document.createElement('div');
            document.body.appendChild(container);
            for (var i = 0; i < numberOfSnowflakes; i++) {
                var s = document.createElement('div');
                s.innerHTML = "❄"; s.className = "snowflake";
                container.appendChild(s);
                snowflakes.push(new Snowflake(s));
            }
            function move() {
                snowflakes.forEach(s => s.update());
                requestAnimationFrame(move);
            }
            move();
        }
        window.addEventListener("DOMContentLoaded", setupSnow);
    </script>
